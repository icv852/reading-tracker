services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vic
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: reading_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/docker-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vic -d reading_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: vic
      DATABASE_PASSWORD: ${PG_PASSWORD}
      DATABASE_NAME: reading_tracker
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
